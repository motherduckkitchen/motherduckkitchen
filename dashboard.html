<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mother Duck Kitchen - Sign in</title>
  <link rel="stylesheet" href="site.css">
  <style>
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;z-index:1}
    .login-card{width:100%;max-width:460px}
    .login-card img{width:110px;display:block;margin:0 auto 10px}
    .status{margin-top:12px;min-height:24px;color:#b42318;font-weight:700;text-align:center;white-space:pre-wrap}
  </style>
</head>
<body>
  <div class="wash"></div>
  <main class="login-wrap">
    <section class="card-white login-card">
      <img src="logo.png" alt="Mother Duck Logo">
      <h2 style="text-align:center">Sign in</h2>
      <input class="input" type="email" id="email" placeholder="Email" autocomplete="username">
      <input class="input" type="password" id="password" placeholder="Password" autocomplete="current-password">
      <button class="btn" id="loginBtn" type="button">Log in</button>
      <div class="status" id="status"></div>
    </section>
  </main>

  <script src="firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script>

    if (!firebase.apps.length) {
      firebase.initializeApp(window.MDK_FIREBASE_CONFIG);
    }

    const auth = firebase.auth();
    const statusBox = document.getElementById("status");
    const loginBtn = document.getElementById("loginBtn");
    const emailEl = document.getElementById("email");
    const passwordEl = document.getElementById("password");

    function showStatus(msg, ok = false) {
      statusBox.textContent = msg;
      statusBox.style.color = ok ? "#18794e" : "#b42318";
    }

    auth.onAuthStateChanged(function(user) {
      if (user) {
        showStatus("Login success. Opening dashboard...", true);
        setTimeout(function () {
          location.replace("dashboard.html");
        }, 300);
      }
    });

    function doLogin() {
      const email = emailEl.value.trim();
      const password = passwordEl.value;

      if (!email || !password) {
        showStatus("Enter email and password.");
        return;
      }

      showStatus("Signing in...", true);
      loginBtn.disabled = true;

      auth.signInWithEmailAndPassword(email, password)
        .then(function() {
          showStatus("Signed in successfully.", true);
        })
        .catch(function(err) {
          showStatus("Login failed: " + err.message);
          loginBtn.disabled = false;
        });
    }

    loginBtn.onclick = doLogin;

    [emailEl, passwordEl].forEach(function(el) {
      el.addEventListener("keydown", function(e) {
        if (e.key === "Enter") doLogin();
      });
    });
  </script>
</body>
</html>
