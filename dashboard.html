<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mother Duck Kitchen - Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:url("kitchen.jpg") center/cover no-repeat fixed;
  min-height:100vh;
}

.wash{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.42);
  backdrop-filter:blur(4px);
}

.page{
  position:relative;
  z-index:1;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.wrap{
  width:100%;
  max-width:1100px;
  text-align:center;
}

.logo{
  width:90px;
  display:block;
  margin:0 auto 10px;
}

.site-title{
  font-size:36px;
  font-weight:800;
  color:#fff;
  text-shadow:0 3px 10px rgba(0,0,0,.30);
  margin-bottom:20px;
}

.card{
  max-width:960px;
  margin:0 auto;
  background:rgba(255,255,255,.88);
  backdrop-filter:blur(10px);
  border-radius:28px;
  padding:34px;
  box-shadow:
    0 18px 45px rgba(0,0,0,.18),
    inset 0 1px 0 rgba(255,255,255,.5);
}

.topbar{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:14px;
  margin-bottom:24px;
  flex-wrap:wrap;
}

.top-btn{
  min-width:120px;
  padding:12px 20px;
  border-radius:18px;
  background:#f8fafc;
  color:#29405a;
  border:1px solid #d6dde5;
  text-decoration:none;
  font-weight:700;
  box-shadow:
    0 2px 8px rgba(0,0,0,.10),
    0 0 14px rgba(255,255,255,.45);
}

.logout{
  background:#2c52a0;
  color:#fff;
  border:0;
  border-radius:12px;
  padding:12px 18px;
  font-weight:700;
  cursor:pointer;
  box-shadow:0 6px 16px rgba(0,0,0,.18);
}

.logout:hover{
  background:#244996;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}

.card-link{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:80px;
  background:#2c52a0;
  color:#fff;
  text-decoration:none;
  border-radius:20px;
  font-weight:800;
  font-size:17px;
  text-align:center;
  box-shadow:
    0 10px 20px rgba(0,0,0,.18),
    0 0 16px rgba(255,255,255,.24);
  transition:.15s;
}

.card-link:hover{
  transform:translateY(-2px);
  background:#244996;
}

@media (max-width:760px){
  .grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="wash"></div>

<main class="page">
<div class="wrap">

<img class="logo" src="logo.png">
<div class="site-title">Mother Duck Kitchen Dashboard</div>

<section class="card">

<div class="topbar">
  <a class="top-btn" href="kitchen.html">Kitchen</a>
  <a class="top-btn" href="brewer_st.html">Brewer St</a>
  <button class="logout" id="logoutBtn">Log out</button>
</div>

<div class="menu-grid">
  <a class="btn" href="kitchen.html">Kitchen</a>
  <a class="btn" href="brewer_st.html">Brewer St</a>

  <a class="btn" href="invoices.html">Invoices</a>
  <a class="btn" href="nursery_new.html">Nursery</a>

  <a class="btn" href="record1_suppliers.html">Approved Suppliers</a>
  <a class="btn" href="food-safety-bible.pdf" target="_blank">Food Safety Bible</a>

  <a class="btn" href="pest_control.html">Pest Control</a>
  <a class="btn" href="food_recall.html">Food Recall</a>

  <a class="btn" href="staff_illness.html">Staff Illness / Accident</a>
  <a class="btn" href="record13.html">Food Safety Program Review</a>

  <a class="btn" href="audit_archive.html">Audit Archive</a>
</div>
</section>
</div>
</main>

<script src="firebase-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
if (!firebase.apps.length) {
  firebase.initializeApp(window.MDK_FIREBASE_CONFIG);
}

const auth = firebase.auth();

auth.onAuthStateChanged(function(user){
  if(!user){
    location.replace("index.html");
  }
});

document.getElementById("logoutBtn").onclick=function(){
  auth.signOut().then(function(){
    location.replace("index.html");
  });
};
</script>

</body>
</html>
