<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mother Duck Kitchen - Dashboard</title>
  <link rel="stylesheet" href="site.css">
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; }
    .wrap { max-width: 1100px; margin: 40px auto; padding: 20px; }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }
    .card-link {
      display: block;
      background: white;
      border-radius: 16px;
      padding: 20px;
      text-decoration: none;
      color: #1746a2;
      font-weight: 700;
      box-shadow: 0 4px 14px rgba(0,0,0,.08);
      border: 1px solid #e5e7eb;
    }
    .btn-small {
      background: #1746a2;
      color: white;
      border: 0;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <h1>Mother Duck Kitchen Dashboard</h1>
      <button class="btn-small" id="logoutBtn">Log out</button>
    </div>

    <div class="grid">
      <a class="card-link" href="cleaning_schedule_new.html">Cleaning Schedule</a>
      <a class="card-link" href="cleaning_weekly_new.html">Weekly Cleaning</a>
      <a class="card-link" href="cleaning_monthly_new.html">Monthly Cleaning</a>
      <a class="card-link" href="staff_illness.html">Staff Illness</a>
      <a class="card-link" href="pest_control.html">Pest Control</a>
      <a class="card-link" href="equipment_log.html">Equipment Log</a>
      <a class="card-link" href="customer_complaints.html">Customer Complaints</a>
      <a class="card-link" href="food_recall.html">Food Recall</a>
      <a class="card-link" href="archive.html">Archive</a>
      <a class="card-link" href="record_1_approved_suppliers.html">Approved Suppliers</a>
      <a class="card-link" href="record_2_supplier_agreement.html">Supplier Agreement</a>
      <a class="card-link" href="thermometer_calibration.html">Thermometer Calibration</a>
    </div>
  </div>

  <script src="firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script>
    if (!firebase.apps.length) {
      firebase.initializeApp(window.MDK_FIREBASE_CONFIG);
    }

    const auth = firebase.auth();

    auth.onAuthStateChanged(function(user) {
      if (!user) {
        location.replace("index.html");
      }
    });

    document.getElementById("logoutBtn").addEventListener("click", function () {
      auth.signOut().then(function () {
        location.replace("index.html");
      });
    });
  </script>
</body>
</html>
