<!doctype html>

<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mother Duck Kitchen - Sign in</title>  <style>
    *{ box-sizing:border-box; }
    html,body{
      height:100%;
      margin:0;
      font:14px/1.4 system-ui,Arial;
    }
    body{
      background:url("kitchen.jpg") center/cover no-repeat fixed;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      padding:16px;
    }
    body::before{
      content:"";
      position:absolute;
      inset:0;
      background:rgba(173,216,230,.55);
      backdrop-filter:blur(2px);
    }
    .card{
      position:relative;
      z-index:1;
      width:100%;
      max-width:380px;
      background:#fff;
      border-radius:16px;
      padding:26px;
      box-shadow:0 8px 28px rgba(0,0,0,.15);
      text-align:center;
    }
    .logo{
      max-width:120px;
      width:100%;
      display:block;
      margin:0 auto 14px;
    }
    h1{
      margin:0 0 16px;
      font-size:20px;
    }
    input{
      width:100%;
      padding:12px;
      margin:8px 0;
      border:1px solid #cfd6dd;
      border-radius:10px;
      font-size:16px;
    }
    button{
      width:100%;
      padding:12px;
      margin-top:10px;
      border:0;
      border-radius:10px;
      font-weight:700;
      background:#0d6efd;
      color:#fff;
      cursor:pointer;
      font-size:16px;
    }
    .msg{
      min-height:20px;
      margin-top:10px;
    }
    .ok{ color:#0f766e; }
    .err{ color:#e11d48; }

    @media (max-width:768px){
      body{
        background-attachment:scroll;
        padding:12px;
      }
      .card{
        max-width:100%;
        padding:18px;
      }
      h1{ font-size:22px; }
    }
  </style></head>
<body><div class="card">
  <img src="logo.png" class="logo" alt="Mother Duck Kitchen">
  <h1>Sign in</h1>  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password"><button id="loginBtn">Log in</button>

  <div id="msg" class="msg"></div>
</div><script>
const LOGIN_EMAIL = "adamnorris80@gmail.com";
const LOGIN_PASSWORD = "MotherDuck2025!";
const IDLE_LIMIT_MS = 30 * 60 * 1000;

const msg = document.getElementById("msg");
const emailEl = document.getElementById("email");
const passEl = document.getElementById("password");
const btn = document.getElementById("loginBtn");

function show(text, ok=false){
  msg.textContent = text;
  msg.className = "msg " + (ok ? "ok" : "err");
}

function markActivity(){
  localStorage.setItem("mdk_last_activity", String(Date.now()));
}

function setSession(){
  localStorage.setItem("mdk_logged_in","1");
  localStorage.setItem("mdk_user_email", LOGIN_EMAIL);
  markActivity();
}

function checkSession(){
  const logged = localStorage.getItem("mdk_logged_in")==="1";
  const last = Number(localStorage.getItem("mdk_last_activity")||"0");

  if(!logged || !last) return;

  if(Date.now() - last > IDLE_LIMIT_MS){
    localStorage.clear();
    return;
  }

  location.replace("dashboard.html");
}

function doLogin(){
  const email = emailEl.value.trim();
  const pass = passEl.value;

  if(!email || !pass){
    show("Enter email and password.");
    return;
  }

  btn.disabled = true;
  btn.textContent = "Signing in...";

  if(email.toLowerCase() === LOGIN_EMAIL.toLowerCase() && pass === LOGIN_PASSWORD){
    setSession();
    show("Login success.", true);
    location.replace("dashboard.html");
    return;
  }

  show("Wrong email or password.");
  btn.disabled = false;
  btn.textContent = "Log in";
}

btn.onclick = doLogin;
emailEl.onkeydown = e => { if(e.key==="Enter") doLogin(); };
passEl.onkeydown = e => { if(e.key==="Enter") doLogin(); };

checkSession();
</script></body>
</html>
