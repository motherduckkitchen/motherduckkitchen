<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Audit Archive</title>

<style>
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:url("kitchen.jpg") center/cover no-repeat fixed;
  min-height:100vh;
}
.wash{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.42);
  backdrop-filter:blur(4px);
}
.page{
  position:relative;
  z-index:1;
  max-width:1200px;
  margin:0 auto;
  padding:24px;
}
.card{
  background:rgba(255,255,255,.90);
  backdrop-filter:blur(10px);
  border-radius:26px;
  padding:24px;
  box-shadow:0 18px 40px rgba(0,0,0,.18);
}
h1{
  margin:0 0 18px;
  text-align:center;
  font-size:34px;
  color:#1f2937;
}
.topbar{
  display:flex;
  gap:12px;
  justify-content:center;
  flex-wrap:wrap;
  margin-bottom:20px;
}
.btn{
  padding:12px 18px;
  border-radius:16px;
  background:#f8fafc;
  color:#29405a;
  border:1px solid #d6dde5;
  text-decoration:none;
  font-weight:700;
  box-shadow:0 2px 8px rgba(0,0,0,.10);
  cursor:pointer;
}
.filters{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  justify-content:center;
  margin-bottom:20px;
}
select{
  padding:12px 14px;
  border-radius:14px;
  border:1px solid #cfd6dd;
  font-size:15px;
}
.month-grid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:12px;
  margin-bottom:20px;
}
.month-btn{
  padding:16px;
  border:none;
  border-radius:18px;
  background:#2c52a0;
  color:white;
  font-weight:800;
  cursor:pointer;
  box-shadow:0 10px 20px rgba(0,0,0,.16), 0 0 16px rgba(255,255,255,.22);
}
.month-btn.active{
  background:#183e88;
}
.records{
  display:grid;
  gap:12px;
}
.record{
  border:1px solid #d7dde4;
  border-radius:16px;
  padding:14px;
  background:#fff;
}
.record strong{
  display:block;
  margin-bottom:6px;
  font-size:22px;
}
.meta{
  font-size:14px;
  color:#555;
  margin:2px 0;
}
.download{
  margin-top:8px;
  display:inline-block;
  text-decoration:none;
  font-weight:700;
  color:#204a9b;
}
.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:12px;
}
.action-btn{
  padding:10px 14px;
  border:none;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
}
.open-btn{
  background:#204a9b;
  color:#fff;
}
.delete-btn{
  background:#b42318;
  color:#fff;
}
.message{
  font-size:16px;
  color:#444;
  padding:12px 4px;
}
@media (max-width:760px){
  .month-grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

</main>

<script>
const monthGrid = document.getElementById("monthGrid");
const recordsWrap = document.getElementById("recordsWrap");
const yearSelect = document.getElementById("yearSelect");
const siteSelect = document.getElementById("siteSelect");
const typeSelect = document.getElementById("typeSelect");

let activeMonth = new Date().getMonth() + 1;
window.MDKArchiveCache = window.MDKArchiveCache || {};

function goBackSmart() {
  window.location.href = "dashboard.html";
}

function buildYears() {
  const currentYear = new Date().getFullYear();
  yearSelect.innerHTML = "";
  for (let y = currentYear - 2; y <= currentYear + 1; y++) {
    const opt = document.createElement("option");
    opt.value = y;
    opt.textContent = y;
    if (y === currentYear) opt.selected = true;
    yearSelect.appendChild(opt);
  }
}

async function buildMonths() {
  const counts = await window.MDKArchive.listMonthCounts(yearSelect.value);
  monthGrid.innerHTML = "";

  for (let i = 1; i <= 12; i++) {
    const btn = document.createElement("button");
    btn.className = "month-btn" + (i === activeMonth ? " active" : "");
    btn.textContent = `${window.MDKArchive.monthName(i)} (${counts[i] || 0})`;
    btn.onclick = async function() {
      activeMonth = i;
      await buildMonths();
      await loadRecords();
    };
    monthGrid.appendChild(btn);
  }
}
