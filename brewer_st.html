<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mother Duck Kitchen - Brewer St</title>

<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#2c52a0">
<link rel="apple-touch-icon" href="/icons/icon-192.png">

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background-image:url("kitchen.jpg");
  background-position:center;
  background-size:cover;
  background-repeat:no-repeat;
  background-attachment:fixed;
  min-height:100vh;
}
.wash{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.42);
  backdrop-filter:blur(4px);
}
.page{
  position:relative;
  z-index:1;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}
.wrap{
  width:100%;
  max-width:1100px;
  text-align:center;
}
.logo{
  width:100px;
  max-width:100%;
  display:block;
  margin:0 auto 8px;
  height:auto;
}
.site-title{
  font-size:40px;
  font-weight:800;
  color:#fff;
  text-shadow:0 3px 10px rgba(0,0,0,.30);
  line-height:1.15;
}
.subtitle{
  color:#fff;
  margin-bottom:18px;
  font-size:20px;
  text-shadow:0 2px 8px rgba(0,0,0,.35);
}
.card{
  max-width:960px;
  margin:0 auto;
  background:rgba(255,255,255,.86);
  backdrop-filter:blur(12px);
  border-radius:28px;
  padding:34px 34px 24px;
  box-shadow:
    0 18px 45px rgba(0,0,0,.18),
    inset 0 1px 0 rgba(255,255,255,.5);
}
.toolbar{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-bottom:20px;
  flex-wrap:wrap;
}
.top-btn{
  min-width:110px;
  padding:12px 20px;
  border-radius:18px;
  background:#f8fafc;
  color:#29405a;
  border:1px solid #d6dde5;
  text-decoration:none;
  font-weight:700;
  box-shadow:
    0 2px 8px rgba(0,0,0,.10),
    0 0 14px rgba(255,255,255,.45);
  display:flex;
  align-items:center;
  justify-content:center;
}
.menu-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:22px;
}
.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:82px;
  padding:16px 20px;
  background:#2c52a0;
  color:#fff;
  text-decoration:none;
  border-radius:20px;
  font-weight:800;
  font-size:18px;
  text-align:center;
  box-shadow:
    0 10px 20px rgba(0,0,0,.18),
    0 0 16px rgba(255,255,255,.24);
  transition:all .15s ease;
}
.btn:hover{
  transform:translateY(-2px);
  background:#244996;
  box-shadow:
    0 16px 28px rgba(0,0,0,.22),
    0 0 22px rgba(255,255,255,.34);
}

@media (max-width:760px){
  body{
    background-attachment:scroll;
  }

  .page{
    padding:12px;
    align-items:flex-start;
  }

  .wrap{
    max-width:100%;
  }

  .logo{
    width:84px;
    margin-top:6px;
  }

  .site-title{
    font-size:30px;
  }

  .subtitle{
    font-size:18px;
    margin-bottom:14px;
  }

  .card{
    padding:18px 16px 16px;
    border-radius:18px;
  }

  .toolbar{
    flex-direction:column;
    align-items:stretch;
  }

  .top-btn{
    width:100%;
    min-width:0;
  }

  .menu-grid{
    grid-template-columns:1fr;
    gap:12px;
  }

  .btn{
    min-height:64px;
    font-size:16px;
    border-radius:16px;
    padding:14px;
  }
}

@media (max-width:480px){
  .page{
    padding:10px;
  }

  .site-title{
    font-size:26px;
  }

  .subtitle{
    font-size:16px;
  }

  .card{
    padding:14px 12px;
  }

  .btn{
    font-size:15px;
    min-height:58px;
  }
}
</style>
</head>

<body>

    <div class="site-title">Mother Duck Kitchen</div>
    <div class="subtitle">Brewer St</div>

    <section class="card">
      <div class="toolbar">
        <a class="top-btn" href="dashboard.html">Home</a>
        <a class="top-btn" href="kitchen.html">Kitchen</a>
        <a class="top-btn" href="invoices.html?site=Brewer%20St">Invoices</a>

      <div class="menu-grid">
        <a class="btn" href="record13.html?site=Brewer%20St">Food Safety Program Review</a>
        <a class="btn" href="record_5a_temp_control_log.html?site=Brewer%20St">Cook / Cool / Reheat</a>
        <a class="btn" href="transport_log.html?site=Brewer%20St">Transfer Log</a>

        <a class="btn" href="cleaning_schedule_new.html?site=Brewer%20St">Daily Cleaning</a>
        <a class="btn" href="cleaning_weekly_new.html?site=Brewer%20St">Weekly Cleaning</a>
        <a class="btn" href="cleaning_monthly_new.html?site=Brewer%20St">Monthly Cleaning</a>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js")
      .then(() => console.log("Service worker registered"))
      .catch((err) => console.error("Service worker failed", err));
  });
}
</script>

<script src="firebase-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
if (!firebase.apps.length) {
  firebase.initializeApp(window.MDK_FIREBASE_CONFIG);
}

const auth = firebase.auth();
const IDLE_LIMIT_MS = 30 * 60 * 1000;
let idleTimer;

function markActivity() {
  localStorage.setItem("mdk_last_activity", String(Date.now()));
}

async function forceLogout() {
  try {
    await auth.signOut();
  } catch (e) {
    console.error(e);
  }
  localStorage.removeItem("mdk_logged_in");
  localStorage.removeItem("mdk_last_activity");
  location.replace("login.html?msg=expired");
}

function resetIdleTimer() {
  clearTimeout(idleTimer);
  markActivity();
  idleTimer = setTimeout(forceLogout, IDLE_LIMIT_MS);
}

function checkSessionAge() {
  const last = Number(localStorage.getItem("mdk_last_activity") || "0");
  if (!last) {
    location.replace("login.html");
    return;
  }
  if (Date.now() - last > IDLE_LIMIT_MS) {
    forceLogout();
  }
}

auth.onAuthStateChanged(function(user){
  if(!user){
    location.replace("login.html");
    return;
  }
  checkSessionAge();
  resetIdleTimer();
});

document.addEventListener("click", resetIdleTimer);
document.addEventListener("keydown", resetIdleTimer);
document.addEventListener("touchstart", resetIdleTimer);
document.addEventListener("mousemove", resetIdleTimer);
document.addEventListener("scroll", resetIdleTimer);
</script>

</body>
</html>
