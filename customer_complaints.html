<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Record 10 – Customer Complaints</title>

<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#2c52a0">
<link rel="apple-touch-icon" href="/icons/icon-192.png">

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:url("kitchen.jpg") center/cover no-repeat fixed;
}

.wash{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.45);
  backdrop-filter:blur(2px);
}

.page{
  position:relative;
  z-index:1;
  max-width:1450px;
  margin:auto;
  padding:20px;
}

.toolbar{
  display:flex;
  gap:10px;
  margin-bottom:14px;
  flex-wrap:wrap;
}

.btn{
  border:0;
  border-radius:16px;
  padding:12px 18px;
  font-weight:700;
  background:#e5e7eb;
}

.back{background:#ffc107;}
.save{background:#2c52a0;color:#fff;}
.edit{background:#16a34a;color:#fff;}

.card{
  background:#fff;
  padding:20px;
  border-radius:20px;
}

h1{font-size:28px;margin-bottom:16px;}

.table-wrap{
  overflow-x:auto;
}

table{
  width:100%;
  min-width:900px;
  border-collapse:collapse;
}

th,td{
  border:1px solid #222;
  padding:6px;
  font-size:13px;
}

textarea{
  min-height:60px;
}

/* MOBILE */
@media (max-width:768px){
  body{background-attachment:scroll;}
  .page{padding:10px;}
  .toolbar{flex-direction:column;}
  .btn{width:100%;}
  h1{font-size:22px;}
  th,td{font-size:12px;}
}
</style>
</head>

<body>

<div class="wash"></div>

<main class="page">

<div class="toolbar">
  <button class="btn back" onclick="goBackSmart()">← Back</button>
  <a href="dashboard.html" class="btn">🏠 Home</a>
  <button onclick="window.print()" class="btn">🖨 Print</button>
  <button id="editBtn" onclick="unlockForEdit()" class="btn edit" style="display:none;">✏ Edit</button>
  <button onclick="clearForm()" class="btn">Clear</button>
  <button onclick="saveForm()" class="btn save">Save</button>
</div>

<div class="card">

<h1 id="pageTitle">Record 10 – Customer Complaints</h1>

<div id="lockedNote" style="display:none;background:#fff3cd;padding:10px;border-radius:10px;">
  Locked — press Edit
</div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>Date</th>
<th>Time</th>
<th>Name / Contact</th>
<th>Complaint</th>
<th>Investigation</th>
<th>Action</th>
<th>Checked</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>
</div>

</div>
</main>

<!-- SERVICE WORKER -->
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}
</script>

<!-- FIREBASE -->
<script src="firebase-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
if (!firebase.apps.length) {
  firebase.initializeApp(window.MDK_FIREBASE_CONFIG);
}

const auth = firebase.auth();

/* 🔒 30 MIN LOCK */
let timer;
function resetTimer(){
  clearTimeout(timer);
  timer = setTimeout(()=>{
    auth.signOut();
    location.replace("login.html");
  }, 1800000);
}

["click","keydown","touchstart"].forEach(e=>{
  document.addEventListener(e, resetTimer);
});

auth.onAuthStateChanged(user=>{
  if(!user) location.replace("login.html");
  resetTimer();
});

/* PAGE LOGIC */
function goBackSmart(){
  location.href="kitchen.html";
}

function buildRows(){
  const tbody=document.getElementById("rows");
  for(let i=0;i<10;i++){
    const tr=document.createElement("tr");

    for(let c=0;c<7;c++){
      const td=document.createElement("td");

      if(c>=3 && c<=5){
        td.innerHTML="<textarea></textarea>";
      }else{
        td.innerHTML="<input>";
      }

      tr.appendChild(td);
    }

    tbody.appendChild(tr);
  }
}

function saveForm(){
  const data=[];
  document.querySelectorAll("input,textarea").forEach(el=>{
    data.push(el.value);
  });
  localStorage.setItem("complaints",JSON.stringify(data));
  alert("Saved");
}

function loadForm(){
  const data=JSON.parse(localStorage.getItem("complaints")||"[]");
  document.querySelectorAll("input,textarea").forEach((el,i)=>{
    el.value=data[i]||"";
  });
}

function clearForm(){
  if(!confirm("Clear?")) return;
  document.querySelectorAll("input,textarea").forEach(el=>el.value="");
}

function unlockForEdit(){
  document.querySelectorAll("input,textarea").forEach(el=>el.disabled=false);
}

buildRows();
loadForm();
</script>

</body>
</html>
