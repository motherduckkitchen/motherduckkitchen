<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCJYbLlMxEo9hyS6it0RiAtrxPxSHi8TrY",
    authDomain: "mdk-fresh-live.firebaseapp.com",
    projectId: "mdk-fresh-live",
    storageBucket: "mdk-fresh-live.firebasestorage.app",
    messagingSenderId: "283345305823",
    appId: "1:283345305823:web:16e857b6d23815e65a96a"
  };

  const msg = document.getElementById("msg");
  const emailEl = document.getElementById("email");
  const passEl = document.getElementById("password");
  const btn = document.getElementById("loginBtn");

  function show(text, ok=false){
    msg.textContent = text;
    msg.className = "msg " + (ok ? "ok" : "err");
  }

  let auth;
  try {
    firebase.initializeApp(firebaseConfig);
    auth = firebase.auth();
    show("Firebase loaded.", true);
  } catch (e) {
    console.error(e);
    show("Init failed: " + (e.message || e));
  }

  async function doLogin() {
    try {
      show("");
      const email = emailEl.value.trim();
      const password = passEl.value;

      if (!email || !password) {
        show("Enter email and password.");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Signing in...";

      await auth.signInWithEmailAndPassword(email, password);
      show("Login success.", true);
      location.replace("dashboard.html");

    } catch (e) {
      console.error(e);
      show("Login failed: " + (e.message || e));
      btn.disabled = false;
      btn.textContent = "Log in";
    }
  }

  btn.addEventListener("click", doLogin);
</script>
