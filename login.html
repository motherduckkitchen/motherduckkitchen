<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mother Duck Kitchen - Sign in</title>

  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#2c52a0">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">

  <style>
    *{ box-sizing:border-box; }
    html,body{
      height:100%;
      margin:0;
      font:14px/1.4 system-ui,Arial;
    }
    body{
      background:url("kitchen.jpg") center/cover no-repeat fixed;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      padding:16px;
    }
    body::before{
      content:"";
      position:absolute;
      inset:0;
      background:rgba(173,216,230,.55);
      backdrop-filter:blur(2px);
    }
    .card{
      position:relative;
      z-index:1;
      width:100%;
      max-width:380px;
      background:#fff;
      border-radius:16px;
      padding:26px;
      box-shadow:0 8px 28px rgba(0,0,0,.15);
      text-align:center;
    }
    .logo{
      max-width:120px;
      width:100%;
      display:block;
      margin:0 auto 14px;
      height:auto;
    }
    h1{
      margin:0 0 16px;
      font-size:20px;
    }
    input{
      width:100%;
      padding:12px;
      margin:8px 0;
      border:1px solid #cfd6dd;
      border-radius:10px;
      font-size:16px;
    }
    button{
      width:100%;
      padding:12px;
      margin-top:10px;
      border:0;
      border-radius:10px;
      font-weight:700;
      background:#0d6efd;
      color:#fff;
      cursor:pointer;
      font-size:16px;
    }
    .msg{
      min-height:20px;
      margin-top:10px;
      word-break:break-word;
    }
    .ok{ color:#0f766e; }
    .err{ color:#e11d48; }

    @media (max-width:768px){
      body{
        background-attachment:scroll;
        padding:12px;
      }
      .card{
        max-width:100%;
        padding:18px;
        border-radius:14px;
      }
      h1{ font-size:22px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="logo.png" alt="Mother Duck Kitchen" class="logo">
    <h1>Sign in</h1>
    <input type="email" id="email" placeholder="Email" autocomplete="username">
    <input type="password" id="password" placeholder="Password" autocomplete="current-password">
    <button id="loginBtn" type="button">Log in</button>
    <div id="msg" class="msg"></div>
  </div>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        try {
          const res = await fetch("/sw.js", { method: "HEAD" });
          if (res.ok) {
            navigator.serviceWorker.register("/sw.js")
              .then(() => console.log("Service worker registered"))
              .catch((err) => console.error("Service worker failed", err));
          }
        } catch (err) {
          console.warn("sw.js not available");
        }
      });
    }

    const msg = document.getElementById("msg");
    const emailEl = document.getElementById("email");
    const passEl = document.getElementById("password");
    const btn = document.getElementById("loginBtn");

    const LOGIN_EMAIL = "adamnorris80@gmail.com";
    const LOGIN_PASSWORD = "MotherDuck2025!";
    const IDLE_LIMIT_MS = 30 * 60 * 1000;

    function show(text, ok=false){
      msg.textContent = text;
      msg.className = "msg " + (ok ? "ok" : "err");
    }

    function markActivity() {
      localStorage.setItem("mdk_last_activity", String(Date.now()));
    }

    function setLoginSession() {
      localStorage.setItem("mdk_logged_in", "1");
      localStorage.setItem("mdk_user_email", LOGIN_EMAIL);
      markActivity();
    }

    function checkAlreadyLoggedIn() {
      const loggedIn = localStorage.getItem("mdk_logged_in") === "1";
      const last = Number(localStorage.getItem("mdk_last_activity") || "0");

      if (!loggedIn || !last) return;

      if (Date.now() - last > IDLE_LIMIT_MS) {
        localStorage.removeItem("mdk_logged_in");
        localStorage.removeItem("mdk_user_email");
        localStorage.removeItem("mdk_last_activity");
        return;
      }

      location.replace("dashboard.html");
    }

    async function doLogin() {
      show("");

      const email = emailEl.value.trim();
      const password = passEl.value;

      if (!email || !password) {
        show("Enter email and password.");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Signing in...";

      if (email.toLowerCase() === LOGIN_EMAIL.toLowerCase() && password === LOGIN_PASSWORD) {
        setLoginSession();
        show("Login success.", true);
        location.replace("dashboard.html");
        return;
      }

      show("Login failed: wrong email or password.");
      btn.disabled = false;
      btn.textContent = "Log in";
    }

    btn.addEventListener("click", doLogin);
    emailEl.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
    passEl.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });

    checkAlreadyLoggedIn();
  </script>
</body>
</html>
