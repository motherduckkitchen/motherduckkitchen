<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mother Duck Kitchen - Sign in</title>
  <style>
    html,body{height:100%;margin:0;font:14px/1.4 system-ui,Arial}
    body{
      background:url("kitchen.jpg") center/cover no-repeat fixed;
      display:flex;align-items:center;justify-content:center;position:relative;
    }
    body::before{
      content:"";position:absolute;inset:0;
      background:rgba(173,216,230,.55);backdrop-filter:blur(2px);
    }
    .card{
      position:relative;z-index:1;width:100%;max-width:380px;
      background:#fff;border-radius:16px;padding:26px;
      box-shadow:0 8px 28px rgba(0,0,0,.15);text-align:center;
    }
    .logo{max-width:120px;display:block;margin:0 auto 14px}
    h1{margin:0 0 16px;font-size:20px}
    input{
      width:100%;padding:12px;margin:8px 0;border:1px solid #cfd6dd;
      border-radius:10px;box-sizing:border-box;
    }
    button{
      width:100%;padding:12px;margin-top:10px;border:0;border-radius:10px;
      font-weight:700;background:#0d6efd;color:#fff;cursor:pointer;
    }
    .msg{min-height:20px;margin-top:10px}
    .ok{color:#0f766e}
    .err{color:#e11d48}
  </style>
</head>
<body>
  <div class="card">
    <img src="logo.png" alt="Mother Duck Kitchen" class="logo">
    <h1>Sign in</h1>
    <input type="email" id="email" placeholder="Email" autocomplete="username">
    <input type="password" id="password" placeholder="Password" autocomplete="current-password">
    <button id="loginBtn" type="button">Log in</button>
    <div id="msg" class="msg"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAt0rXQIIZI2MxS0a6b6ObixF0Bf-UiiPI",
      authDomain: "md-kitchen-live.firebaseapp.com",
      projectId: "md-kitchen-live",
      storageBucket: "md-kitchen-live.firebasestorage.app",
      messagingSenderId: "552178339796",
      appId: "1:552178339796:web:14ca54af158fd40e089041"
    };

    const msg = document.getElementById("msg");
    const emailEl = document.getElementById("email");
    const passEl = document.getElementById("password");
    const btn = document.getElementById("loginBtn");

    function show(text, ok=false){
      msg.textContent = text;
      msg.className = "msg " + (ok ? "ok" : "err");
    }

    let auth;
    try {
      if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
      auth = firebase.auth();
      show("Firebase loaded.", true);
    } catch (e) {
      console.error(e);
      show("Init failed: " + (e.message || e));
    }

    async function doLogin() {
      try {
        show("");
        const email = emailEl.value.trim();
        const password = passEl.value;

        if (!email || !password) {
          show("Enter email and password.");
          return;
        }

        if (!auth) {
          show("Auth not ready.");
          return;
        }

        btn.disabled = true;
        btn.textContent = "Signing in...";

        await auth.signInWithEmailAndPassword(email, password);
        show("Login success.", true);
        location.replace("dashboard.html");
      } catch (e) {
        console.error(e);
        show("Login failed: " + (e.message || e));
        btn.disabled = false;
        btn.textContent = "Log in";
      }
    }

    btn.addEventListener("click", doLogin);
    emailEl.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
    passEl.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
  </script>
</body>
</html>
