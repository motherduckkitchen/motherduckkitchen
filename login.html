<script>
  const firebaseConfig = {
    apiKey: "AIzaSyD9dVq_Jkb0H5UkVKxTjZiadulqdAMg4R8",
    authDomain: "md-kitchen-live.firebaseapp.com",
    projectId: "md-kitchen-live",
    storageBucket: "md-kitchen-live.firebasestorage.app",
    messagingSenderId: "552178339796",
    appId: "1:552178339796:web:f1041a3d98955c96089041"
  };

  const msg = document.getElementById("msg");
  const emailEl = document.getElementById("email");
  const passEl = document.getElementById("password");
  const btn = document.getElementById("loginBtn");

  function show(text, ok=false){
    msg.textContent = text;
    msg.className = "msg " + (ok ? "ok" : "err");
  }

  let auth;
  try {
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    auth = firebase.auth();
    show("Firebase loaded.", true);
  } catch (e) {
    console.error(e);
    show("Init failed: " + (e.message || e));
  }

  async function doLogin() {
    try {
      show("");
      const email = emailEl.value.trim();
      const password = passEl.value;

      if (!email || !password) {
        show("Enter email and password.");
        return;
      }

      if (!auth) {
        show("Auth not ready.");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Signing in...";

      await auth.signInWithEmailAndPassword(email, password);
      show("Login success.", true);
      location.replace("dashboard.html");
    } catch (e) {
      console.error(e);
      show("Login failed: " + (e.message || e));
      btn.disabled = false;
      btn.textContent = "Log in";
    }
  }

  btn.addEventListener("click", doLogin);
  emailEl.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
  passEl.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
</script>
